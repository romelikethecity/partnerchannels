<!DOCTYPE html>
<!--
  Partner Channels — OG Default Template
  Render at 1200x630 pixels. General-purpose fallback for core/misc pages.
  Placeholders: {{TITLE}}, {{SUBTITLE}}
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #0F172A;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 64px;
  }
  .og-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .og-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse at bottom right, rgba(37,99,235,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #F0F0F0;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: #2563EB; }
  .domain {
    font-family: 'Source Code Pro', monospace;
    font-size: 18px;
    color: #9B9B9B;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .content {
    position: relative;
    z-index: 1;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #FFFFFF;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 16px;
    max-width: 900px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #9B9B9B;
    max-width: 640px;
    line-height: 1.5;
    margin-bottom: 24px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .accent-bar {
    width: 80px;
    height: 4px;
    background: #2563EB;
    border-radius: 2px;
  }
  .deco-wave {
    position: absolute;
    right: 64px;
    bottom: 80px;
    opacity: 0.15;
  }
</style>
</head>
<body>
  <div class="og-card">
    <div class="top-bar">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 36 36">
          <rect width="36" height="36" rx="8" fill="#2563EB"/>
          <circle cx="18" cy="10" r="3" fill="#fff"/>
          <circle cx="10" cy="24" r="3" fill="#fff"/>
          <circle cx="26" cy="24" r="3" fill="#fff"/>
          <line x1="18" y1="13" x2="10" y2="21" stroke="#fff" stroke-width="1.5"/>
          <line x1="18" y1="13" x2="26" y2="21" stroke="#fff" stroke-width="1.5"/>
          <line x1="10" y1="24" x2="26" y2="24" stroke="#fff" stroke-width="1.5"/>
        </svg>
        <div class="logo-text">Partner <span>Channels</span></div>
      </div>
      <div class="domain">PARTNERCHANNELS.COM</div>
    </div>
    <div class="content">
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
      <div class="accent-bar"></div>
    </div>
    <svg class="deco-wave" width="200" height="60" viewBox="0 0 200 60">
      <polyline points="0,30 25,30 45,8 70,52 95,15 120,42 145,22 170,35 195,30 200,30" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
